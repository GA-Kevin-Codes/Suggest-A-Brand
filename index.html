<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>

    <link rel="canonical" href="https://ga-kevin-codes.codeberg.page/Suggest-A-Brand/">

    <script>
      const newBase = "https://ga-kevin-codes.codeberg.page/Suggest-A-Brand";
      const path = window.location.pathname.replace("/Suggest-A-Brand", "");
      const query = window.location.search;
      const hash = window.location.hash;
      window.location.replace(newBase + path + query + hash);
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a href="https://ga-kevin-codes.codeberg.page/Suggest-A-Brand/">
        the new site
      </a>...
    </p>
  </body>
</html>
