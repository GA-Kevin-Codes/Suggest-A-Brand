<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NSI — Suggest a Brand</title>
<style>
  :root{--bg:#0f1117;--card:#161a22;--text:#e6e6e6;--muted:#9aa1ad;--brand:#3ea6ff;--border:#252b36}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial}
  .wrap{max-width:880px;margin:0 auto;padding:1.25rem}
  h1{margin:.2rem 0 1rem}
  fieldset{border:1px solid var(--border);border-radius:12px;background:var(--card);padding:1rem;margin:1rem 0}
  legend{color:var(--muted);padding:0 .5rem}
  label{display:block;margin:.75rem 0}
  input,select,textarea{width:100%;background:#0c0f14;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:.6rem .7rem}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
  .btn{background:var(--brand);color:#041019;border:none;border-radius:999px;padding:.6rem 1rem;font-weight:600;cursor:pointer}
  .muted{color:var(--muted)}
  pre{background:#0b0e13;border:1px solid var(--border);border-radius:10px;padding:.75rem;overflow:auto}
  small.hint{display:block;color:var(--muted);margin-top:.25rem}
  /* Wikidata combobox */
  .wk-combo{position:relative;display:flex}
  .wk-combo>input{flex:1;border-radius:10px 0 0 10px;border-right:none;min-width:0}
  .wk-combo>input:focus{outline:none;border-color:var(--brand);z-index:1}
  .wk-btn{background:var(--brand);color:#041019;border:none;border-radius:0 10px 10px 0;padding:.6rem 1.1rem;font-weight:600;cursor:pointer;flex-shrink:0}
  .wk-list{position:absolute;top:calc(100% + 4px);left:0;right:0;list-style:none;margin:0;padding:0;
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    box-shadow:0 6px 24px rgba(0,0,0,.6);z-index:100;max-height:272px;overflow-y:auto;display:none}
  .wk-list.open{display:block}
  .wk-list li{padding:.6rem .85rem;cursor:pointer;border-bottom:1px solid var(--border);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wk-list li:last-child{border-bottom:none}
  .wk-list li:hover,.wk-list li.active{background:var(--bg)}
  .wl-name{font-weight:600}
  .wl-qid{color:var(--muted);font-size:.88em}
  .wl-sep{color:var(--muted);font-size:.88em}
  .wl-desc{color:var(--muted);font-size:.88em}
</style>
</head>
<body>
<main class="wrap">
  <h1>Suggest-A-Brand</h1>
  <h2>Name Suggestion Index</h2>
  <p class="muted">Search for a brand by name or QID and select a result to auto-fill the form.</p>
  <p><a href="https://github.com/GA-Kevin-Codes/Suggest-A-Brand">Suggest-A-Brand on GitHub</a>.</p>

  <form id="nsi-form">
    <fieldset>
      <legend>Wikidata</legend>
      <label>Brand search
        <div class="wk-combo">
          <input id="wikidata" name="wikidata" required autocomplete="off"
                 placeholder="Brand name or Q-code — e.g. McDonald's or Q38076"
                 role="combobox" aria-autocomplete="list" aria-haspopup="listbox"
                 aria-expanded="false" aria-controls="wkList">
          <button id="lookupBtn" type="button" class="wk-btn">Lookup</button>
          <ul id="wkList" class="wk-list" role="listbox"></ul>
        </div>
        <small class="hint">Type to search — select a suggestion, or enter a QID directly and press Lookup.</small>
        <small id="wkStatus" class="hint"></small>
      </label>
      <!-- Hidden field to carry the fetched label through FormData -->
      <input type="hidden" id="displayName" name="displayName">
    </fieldset>

    <fieldset>
      <legend>Category & Location</legend>
      <div class="row">
        <label>OSM tag key
          <select name="tagKey" id="tagKey">
            <option value="amenity" selected>amenity</option>
            <option value="shop">shop</option>
            <option value="craft">craft</option>
            <option value="office">office</option>
            <option value="tourism">tourism</option>
            <option value="leisure">leisure</option>
            <option value="man_made">man_made</option>
            <option value="healthcare">healthcare</option>
          </select>
        </label>
        <label>OSM tag value
          <input id="tagValue" name="tagValue" placeholder="OSM Value">
        </label>
      </div>
      <div class="row">
        <label>Include
          <input name="include" id="include" placeholder="">
          <small class="hint">Defaults to the brand's service area or country from Wikidata. You can override with <a href="https://ideditor.codes">Country Coder</a> values, separated by comma.</small>
        </label>
        <label>Exclude
          <input name="exclude" id="exclude" placeholder="e.g. US,NO">
        </label>
      </div>
      <div class="row">
        <label>Number of locations
          <input id="locationCount" name="locationCount" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 58">
        </label>
        <label>Location URL
          <input id="locationUrl" name="locationUrl" type="url" placeholder="https://example.com/locations">
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Preview</legend>
      <pre id="preview" aria-live="polite">{}</pre>
    </fieldset>

    <button class="btn" type="submit">Open prefilled GitHub issue</button>
    <p id="tip" class="muted"></p>
  </form>
</main>

<script>
// ===== Repo config =====
const OWNER = "osmlab";
const REPO  = "name-suggestion-index";

// ===== Tiny helpers =====
const $ = id => document.getElementById(id);
const form = $("nsi-form");
const preview = $("preview");
const tip = $("tip");
const wikidataInput = $("wikidata");
const displayNameInput = $("displayName");
const wkStatus = $("wkStatus");
const includeInput = $("include");

const csv = s => String(s ?? "").split(",").map(x => x.trim()).filter(Boolean);
const withTrailingComma = s => s.replace(/}\s*$/, '},');
const upper = s => String(s ?? "").trim().toUpperCase();

function formatCountryList(codes){
  const normalized = (codes || []).map(upper).filter(Boolean);
  if (!normalized.length) return "001";
  if (normalized.length === 1) {
    if (normalized[0] === "001") return "worldwide";
    if (normalized[0] === "US") return "the US";
    return normalized[0];
  }
  return normalized.join(", ");
}

function formatLocationSummary(locationCount, codes){
  const count = String(locationCount || "").trim();
  const area = formatCountryList(codes);
  if (!count) return area;
  const noun = count === "1" ? "location" : "locations";
  if (area === "worldwide") return `${count} ${noun} worldwide`;
  return `${count} ${noun} in ${area}`;
}

// Build minimal NSI object, pruning empty bits
function toNSI(formData){
  const displayName = (formData.get("displayName")||"").trim();
  const tagKey      = (formData.get("tagKey")||"amenity").trim();
  const tagValue    = (formData.get("tagValue")||"").trim();
  const wikidata    = (formData.get("wikidata")||"").trim();

  const inc = csv(formData.get("include"));
  const obj = {
    displayName,
    id: displayName,
    locationSet:{ include: inc.length ? inc : ["001"] },
    tags:{ [tagKey]: tagValue, name: displayName, brand: displayName }
  };
  const ex = csv(formData.get("exclude"));
  if (ex.length) obj.locationSet.exclude = ex;
  if (wikidata)  obj.tags["brand:wikidata"] = wikidata;
  return obj;
}

function refreshPreview(){
  const json = JSON.stringify(toNSI(new FormData(form)), null, 2);
  preview.textContent = withTrailingComma(json);
}

// Wikidata lookup (QID → label + location)
async function lookupWikidata(qid){
  wkStatus.textContent = "Looking up…";
  displayNameInput.value = "";
  try{
    const r = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${encodeURIComponent(qid)}.json`);
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    const entity = data.entities?.[qid];
    const label  = entity?.labels?.en?.value || Object.values(entity?.labels||{})[0]?.value || "";
    if(label){
      displayNameInput.value = label;
      wkStatus.textContent = `✓ ${label}`;
      await populateLocation(entity);
    }else{
      wkStatus.textContent = "No label found — this item has no readable label.";
    }
  }catch(e){
    wkStatus.textContent = "Couldn't fetch Wikidata. Check the QID (e.g., Q12345).";
  }finally{ refreshPreview(); }
}

// Populate include field from Wikidata: service area (P2541) first, then country (P17)
async function populateLocation(entity){
  for (const pid of ["P2541", "P17"]) {
    const qids = [];
    (entity?.claims?.[pid] || []).forEach(claim => {
      const id = claim?.mainsnak?.datavalue?.value?.id;
      if (id) qids.push(id);
    });
    if (!qids.length) continue;
    const codes = await qidsToIso2(qids);
    if (codes.length) {
      includeInput.value = codes.join(', ');
      return;
    }
  }
  includeInput.value = '001';
}

// Convert Wikidata QIDs to ISO 3166-1 alpha-2 codes
async function qidsToIso2(qids){
  try{
    const r = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${qids.join('|')}.json`);
    if(!r.ok) throw new Error(r.status);
    const data = await r.json();
    const codes = [];
    qids.forEach(id => {
      const code = data.entities?.[id]?.claims?.P297?.[0]?.mainsnak?.datavalue?.value;
      if(code) codes.push(code.toLowerCase());
    });
    return Array.from(new Set(codes));
  }catch(e){
    return [];
  }
}

// Events
form.addEventListener("input", refreshPreview);
$("lookupBtn").addEventListener("click", ()=>{
  const qid = wikidataInput.value.trim();
  if(!/^Q\d+$/.test(qid)) return wkStatus.textContent = "Please enter a valid QID (e.g., Q12345).";
  lookupWikidata(qid);
});

// Submit → open prefilled GitHub issue
form.addEventListener("submit", e=>{
  e.preventDefault();
  const formData = new FormData(form);
  const obj = toNSI(formData);
  if(!obj.displayName){ tip.textContent = "Please look up the Wikidata label first."; return; }

  const firstTagKey = Object.keys(obj.tags).find(k=>k!=="brand" && k!=="brand:wikidata") || "amenity";
  const firstTagVal = String(obj.tags[firstTagKey]||"").trim();
  const locationCount = String(formData.get("locationCount") || "").trim();
  const locationUrl = String(formData.get("locationUrl") || "").trim();
  const locationSummary = formatLocationSummary(locationCount, obj.locationSet.include || []);
  const title = `${obj.displayName} — ${firstTagKey}=${firstTagVal} (${locationSummary})`;

  const fileVal = firstTagVal.replace(/\s+/g, "_");
  const dataFileUrl = `https://github.com/${OWNER}/${REPO}/blob/main/data/brands/${firstTagKey}/${fileVal}.json`;
  const wikidataQid = String(obj.tags["brand:wikidata"] || "").trim();
  const wikidataUrl = wikidataQid ? `https://www.wikidata.org/wiki/${encodeURIComponent(wikidataQid)}` : "";

  let body = "```json\n" + withTrailingComma(JSON.stringify(obj, null, 2)) + "\n```";
  body += "\n\n**Notes to editors**\n\nCreated with https://ga-kevin-codes.github.io/Suggest-A-Brand/\n";
  if (wikidataUrl) body += `Wikidata item: ${wikidataUrl}\n`;
  if (locationUrl) body += `Location URL: ${locationUrl}\n`;
  body += `Data file: ${dataFileUrl}`;

  const url = new URL(`https://github.com/${OWNER}/${REPO}/issues/new`);
  url.searchParams.set("title", title);
  url.searchParams.set("body", body);
  window.open(url.toString(), "_blank", "noopener");
});

  // ===== Autocomplete =====
  function detectLang(text) {
    if (/[\u0400-\u04FF]/.test(text)) return 'ru';
    if (/[\u0600-\u06FF]/.test(text)) return 'ar';
    if (/[\u4E00-\u9FFF]/.test(text)) return 'zh';
    if (/[\u3040-\u30FF]/.test(text)) return 'ja';
    if (/[\uAC00-\uD7AF]/.test(text)) return 'ko';
    return 'en';
  }

  const wkList = $("wkList");
  let acTimer = null;
  let activeIdx = -1;

  function closeSuggestions() {
    wkList.classList.remove('open');
    wikidataInput.setAttribute('aria-expanded', 'false');
    activeIdx = -1;
  }

  function setActive(idx) {
    const items = wkList.querySelectorAll('li');
    items.forEach((li, i) => li.classList.toggle('active', i === idx));
    activeIdx = idx;
  }

  function renderSuggestions(results) {
    wkList.innerHTML = '';
    if (!results.length) { closeSuggestions(); return; }
    results.forEach(item => {
      const li = document.createElement('li');
      li.setAttribute('role', 'option');
      const name = item.label || item.id;
      const desc = item.description
        ? ` <span class="wl-sep">—</span> <span class="wl-desc">${item.description}</span>`
        : '';
      li.innerHTML = `<span class="wl-name">${name}</span> <span class="wl-qid">(${item.id})</span>${desc}`;
      li.addEventListener('mousedown', e => {
        e.preventDefault();
        wikidataInput.value = item.id;
        closeSuggestions();
        lookupWikidata(item.id);
      });
      wkList.appendChild(li);
    });
    wkList.classList.add('open');
    wikidataInput.setAttribute('aria-expanded', 'true');
    activeIdx = -1;
  }

  async function searchSuggestions(query) {
    const lang = detectLang(query);
    try {
      const r = await fetch(`https://www.wikidata.org/w/api.php?action=wbsearchentities&format=json&type=item&origin=*&language=${lang}&limit=8&search=${encodeURIComponent(query)}`);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      renderSuggestions(data.search || []);
    } catch (e) { closeSuggestions(); }
  }

  wikidataInput.addEventListener('input', () => {
    const val = wikidataInput.value.trim();
    clearTimeout(acTimer);
    if (val.length < 2) { closeSuggestions(); return; }
    acTimer = setTimeout(() => searchSuggestions(val), 300);
  });

  wikidataInput.addEventListener('keydown', e => {
    const items = wkList.querySelectorAll('li');
    if (!items.length || !wkList.classList.contains('open')) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(Math.min(activeIdx + 1, items.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(Math.max(activeIdx - 1, 0)); }
    else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); items[activeIdx].dispatchEvent(new MouseEvent('mousedown')); }
    else if (e.key === 'Escape') { closeSuggestions(); }
  });

  wikidataInput.addEventListener('blur', () => setTimeout(closeSuggestions, 150));

// init
refreshPreview();
</script>
</body>
</html>
